<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Günlük antrenman programı, egzersiz rehberi ve aylık ilerleme takibi. GYM Web ile fitness hedeflerine ulaş!">
  <meta name="theme-color" content="#0a0a0f">
  <title>GYM Web — Antrenman Takip</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏋️</text></svg>">
</head>
<body>

  <div class="app-container">
    <!-- HEADER -->
    <header class="header">
      <div class="header-logo">GYM Web</div>
      <div class="header-subtitle">Antrenman Takip</div>
      <div class="header-date" id="header-date"></div>
    </header>

    <!-- SCREEN: Today -->
    <section id="screen-today" class="screen active">
      <div id="today-content"></div>
    </section>

    <!-- SCREEN: Workout -->
    <section id="screen-workout" class="screen">
      <div id="workout-content"></div>
    </section>

    <!-- SCREEN: History -->
    <section id="screen-history" class="screen">
      <div id="history-content"></div>
    </section>
  </div>

  <!-- BOTTOM NAVIGATION -->
  <nav class="nav-bar">
    <button class="nav-btn active" data-screen="today" id="nav-today">
      <span class="nav-icon">📋</span>
      Bugün
    </button>
    <button class="nav-btn" data-screen="workout" id="nav-workout">
      <span class="nav-icon">🏋️</span>
      Antrenman
    </button>
    <button class="nav-btn" data-screen="history" id="nav-history">
      <span class="nav-icon">📊</span>
      İlerleme
    </button>
  </nav>

  <!-- HISTORY DETAIL MODAL -->
  <div id="history-detail-overlay" class="history-detail-overlay" onclick="if(event.target===this) closeHistoryDetail()">
    <div class="history-detail-modal" id="modal-content"></div>
  </div>

  <!-- SUCCESS OVERLAY -->
  <div id="success-overlay" class="success-overlay">
    <div class="success-content" id="success-details"></div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <!-- WEIGHT TRACKER MODAL -->
  <div id="weight-tracker-overlay" class="weight-tracker-overlay" onclick="if(event.target===this) closeWeightTrackerModal()">
    <div class="weight-tracker-modal">
      <div class="modal-header">
        <div>
          <div style="font-family: 'Outfit', sans-serif; font-size: 1.4rem; font-weight: 800; color: var(--accent-1);">⚖️ Kilo Güncelle</div>
          <div style="font-size: 0.9rem; color: var(--text-secondary); margin-top: 4px;">Harika gidiyorsun! Güncel kilon nedir?</div>
        </div>
        <button class="modal-close" onclick="closeWeightTrackerModal()">✕</button>
      </div>
      <div class="weight-input-container">
        <input type="number" id="weight-input-box" step="0.1" placeholder="örn: 75.5" class="weight-input-box">
        <span class="weight-unit">KG</span>
      </div>
      <button class="btn-primary" onclick="saveWeight()">Kaydet</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
